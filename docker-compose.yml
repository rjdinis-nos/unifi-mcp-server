services:
  unifi-mcp:
    image: ghcr.io/rjdinis-nos/unifi-mcp-server:latest
    container_name: unifi-mcp-server
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      FASTMCP_TRANSPORT: streamable-http
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 3000
    volumes:
      - ./logs:/app/logs
      - ./audit.log:/app/audit.log
